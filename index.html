<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAN-13 条形码生成器</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
                <div class="header-top">
                    <div class="lang-top-left">
                        <select id="lang-select" aria-label="Language selector">
                            <option value="en" selected>English</option>
                            <option value="nl">Nederlands</option>
                            <option value="zh">简体中文</option>
                        </select>
                    </div>
                    <h1 data-i18n="title">EAN-13 条形码生成器</h1>
                </div>
                <p class="subtitle" data-i18n="subtitle">输入0-8位自定义数字作为前缀，自动生成完整的EAN-13条形码</p>
        </header>

        <div class="input-section">
            <label for="prefix-input" data-i18n="label_prefix">输入前缀数字（0-8位，例如：690 或 69012）：</label>
            <input 
                type="text" 
                id="prefix-input" 
                data-i18n-placeholder="placeholder_prefix"
                placeholder="例如: 690 或 69012"
                maxlength="8"
                pattern="[0-9]{0,8}"
            >
            <label for="count-input" data-i18n="label_count">生成数量：</label>
            <input 
                type="number" 
                id="count-input" 
                placeholder="例如: 5"
                min="1"
                max="50"
                value="1"
            >
            <button id="generate-btn">生成条形码</button>
        </div>

        <div class="result-section" id="result-section" style="display: none;">
            <div class="result-header">
                <h2 data-i18n="result_header">生成的EAN-13条形码</h2>
                <div class="result-summary" id="result-summary"></div>
            </div>
            <div class="batch-download-controls" id="batch-download-controls" style="display: none;">
                <div class="select-controls">
                    <label class="select-all-label">
                        <input type="checkbox" id="select-all-checkbox">
                        <span data-i18n="select_all">全选</span>
                    </label>
                    <div class="scale-selector">
                        <label for="download-scale" data-i18n="label_ratio">长宽比:</label>
                        <select id="download-scale">
                            <option value="5:1" data-i18n-option="ratio_5_1">5:1 (宽)</option>
                            <option value="4:1" selected data-i18n-option="ratio_4_1">4:1 (推荐)</option>
                            <option value="3:1" data-i18n-option="ratio_3_1">3:1 (标准)</option>
                            <option value="2:1" data-i18n-option="ratio_2_1">2:1 (正方)</option>
                        </select>
                    </div>
                    <button id="batch-download-btn" class="batch-download-btn">
                        📦 <span data-i18n="download_selected">下载选中的条形码</span> (<span id="download-count">0</span>)
                    </button>
                </div>
            </div>
            <div class="barcodes-container" id="barcodes-container">
                <!-- 条形码将动态插入这里 -->
            </div>
        </div>

        <div class="error-message" id="error-message" style="display: none;"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
